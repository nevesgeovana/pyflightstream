# Docs configuration for ProperDocs (the maintained MkDocs fork; the
# repository migrated after a green drop-in test, 2026-07-23, license
# evidence reports/RPT-009). Kept at the repository root (the builder
# requires the config file outside docs_dir); the DLV-004 tree placed
# it under docs/, a deliberate small deviation recorded at M0.
site_name: pyflightstream
site_description: Version-aware, didactic Python driver for FlightStream
repo_url: https://github.com/nevesgeovana/pyflightstream

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.top

# The generated reference/SUMMARY.md exists only to feed literate-nav;
# the hook keeps it out of the rendered site (exclude_docs cannot see
# gen-files virtual files).
hooks:
  - scripts/docs_hooks.py

plugins:
  - search
  # The command reference and the compatibility matrix are generated at
  # build time from the command database (single rendering source:
  # src/pyflightstream/reference.py, shared with pyflightstream.help()).
  # Nothing generated is committed.
  - gen-files:
      scripts:
        - scripts/gen_docs_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Architecture: architecture.md
  - SRS:
      - srs/index.md
      - Introduction: srs/introduction.md
      - Philosophy: srs/philosophy.md
      - Scope: srs/scope.md
      - Data and evidence model: srs/data-model.md
      - Architecture: srs/architecture-srs.md
      - Functional requirements: srs/functional-requirements.md
      - Non-functional requirements: srs/nonfunctional-requirements.md
      - Standards alignment: srs/standards.md
      - Roadmap: srs/roadmap.md
  - Command reference: reference/
  - Compatibility matrix: compatibility.md
  - Mesh inputs and GUI-only operations: mesh-inputs.md
  - Sister library (ITACA): sister-itaca.md
  - Examples:
      - Steady polar: examples/steady_polar.md
      - Wing static deflection: examples/wing_static_deflection.md
      - FSI Campbell diagram: examples/fsi_campbell_diagram.md
